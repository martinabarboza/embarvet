<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Policlínico Veterinario</title>
    <link
      href="public/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <script src="public/js/jquery-4.0.0.min.js"></script>
  </head>
  <body>
    <header>
      <!--Navbar-->
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid ms-5">
          <a class="navbar-brand" href="#">
            <img
              src="img/embarvet-logo.png"
              alt="Logo"
              width="110"
              height="auto"
              class="d-inline-block align-text-top"
            />
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a
                  class="nav-link btn btn-outline-info"
                  aria-current="page"
                  href="#"
                  ><i class="bi bi-house-fill"></i> Inicio</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link btn btn-outline-info" href="#"
                  ><i class="bi bi-bandaid-fill"></i> Servicios</a
                >
              </li>
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle btn btn-outline-info"
                  href="#"
                  role="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  <i class="bi bi-clipboard-plus-fill"></i> Reservas
                </a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="#">Agendar cita</a></li>
                  <li><a class="dropdown-item" href="#">Ver mis citas</a></li>
                  <li><hr class="dropdown-divider" /></li>
                  <li>
                    <a class="dropdown-item" href="#">Cancelar cita</a>
                  </li>
                </ul>
              </li>
              <li class="nav-item">
                <a class="nav-link btn btn-outline-info"
                  ><i class="bi bi-person-fill"></i> Iniciar Sesión</a
                >
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Búsqueda"
                aria-label="Search"
              />
              <button class="btn btn-outline-success" type="submit">
                <i class="bi bi-search"></i>
              </button>
            </form>
          </div>
        </div>
      </nav>
    </header>

    <!--Carousel-->
    <section>
      <div class="hero-content text-white" style="border: 2px solid red">
        <div class="container">
          <div class="col-md-6 col-lg-5">
            <h1 class="display-3 fw-bold">
              El cuidado que tu mascota necesita
            </h1>
            <p class="lead fs-4">
              Atención profesional con respaldo académico.
            </p>
            <a href="#" class="btn btn-danger btn-lg">Agendar cita</a>
          </div>
        </div>
      </div>
      <div
        id="carouselExampleAutoplaying"
        class="carousel slide position-relative"
        data-bs-ride="carousel"
        data-bs-interval="4000"
        data-bs-pause="false"
      >
        <div class="carousel-indicators">
          <button
            type="button"
            data-bs-target="#carouselExampleAutoplaying"
            data-bs-slide-to="0"
            class="active"
            aria-current="true"
            aria-label="Slide 1"
          ></button>
          <button
            type="button"
            data-bs-target="#carouselExampleAutoplaying"
            data-bs-slide-to="1"
            aria-label="Slide 2"
          ></button>
          <button
            type="button"
            data-bs-target="#carouselExampleAutoplaying"
            data-bs-slide-to="2"
            aria-label="Slide 3"
          ></button>
        </div>
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img
              src="img/hero-image-vet.jpg"
              style="height: 700px; width: 100%; object-fit: cover"
              class="d-block w-100"
              alt="Veterinaria atendiendo mascota"
            />
            <div
              class="position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-50"
            ></div>
          </div>
          <div class="carousel-item">
            <img
              src="img/hero-image-launch.png"
              style="height: 700px; width: 100%; object-fit: cover"
              class="d-block w-100"
              alt="Inauguración del Policlínico"
            />
            <div
              class="position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-50"
            ></div>
          </div>
          <div class="carousel-item">
            <img
              src="img/hero-image-crew.jpg"
              style="height: 700px; width: 100%; object-fit: cover"
              class="d-block w-100"
              alt="Equipo del Policlínico"
            />
            <div
              class="position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-50"
            ></div>
          </div>
        </div>
      </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
